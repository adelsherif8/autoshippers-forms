name: Release Plugin

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          rsync -av --exclude='.git' --exclude='.github' --exclude='release.sh' \
            ./ /tmp/build/autoshippers-forms/
          cd /tmp/build
          zip -r autoshippers-forms.zip autoshippers-forms/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/build/autoshippers-forms.zip
