<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="32" fill="#0f1117"/>
  <rect x="0" y="0" width="8" height="256" rx="4" fill="#ee7a00"/>

  <!-- Truck body -->
  <rect x="48" y="120" width="110" height="64" rx="6" fill="#ee7a00"/>
  <!-- Cab -->
  <rect x="158" y="136" width="52" height="48" rx="6" fill="#cc6600"/>
  <!-- Window -->
  <rect x="164" y="142" width="32" height="24" rx="4" fill="#0f1117" opacity="0.6"/>
  <!-- Wheels -->
